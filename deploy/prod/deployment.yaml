apiVersion: apps/v1
kind: Deployment
metadata:
  name: agon-web
  namespace: latere
  labels:
    app: agon-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agon-web
  template:
    metadata:
      labels:
        app: agon-web
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agon-web
          image: ghcr.io/latere-ai/agon-web:main
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 24Mi
            limits:
              cpu: 100m
              memory: 96Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  lint:
    name: golangci-lint v2 (pre)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          args: --timeout=3m

  test:
    name: test (race)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - run: go vet ./...
      - run: go test -race -timeout 120s ./...

  goreleaser:
    name: goreleaser
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

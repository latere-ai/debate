name: real-e2e

# Manually triggered. Real e2e tests against actual claude/codex
# installs are out of scope for PR CI but available for release-cut.
on:
  workflow_dispatch: {}

jobs:
  real-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
      - run: go test -tags real_e2e -timeout 30m ./e2e/real/...
        env:
          RUN_REAL: "1"

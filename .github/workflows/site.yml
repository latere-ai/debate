name: Site

# Agon landing site (agon.latere.ai). Deploys on push to main when
# site files change. The `v*` tag path is owned by release.yml
# (goreleaser, the `agon` CLI) and is deliberately NOT a trigger
# here — tagging the repo must not deploy the website.
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "internal/web/**"
      - "cmd/agon-web/**"
      - "Dockerfile.web"
      - "deploy/prod/**"
      - ".github/workflows/site.yml"

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ghcr.io/latere-ai/agon-web:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ghcr.io/latere-ai/agon-web:main
            ghcr.io/latere-ai/agon-web:sha-${{ github.sha }}
          build-args: VERSION=${{ github.sha }}
          cache-from: type=gha,scope=agon-web
          cache-to: type=gha,mode=max,scope=agon-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://agon.latere.ai
    steps:
      - uses: actions/checkout@v4
      - uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_TOKEN }}
      # --expiry-seconds: ephemeral kubeconfig credentials, no persistent PAT.
      - run: doctl kubernetes cluster kubeconfig save latere-k8s --expiry-seconds 3600
      - name: Deploy to production
        run: |
          kubectl apply -f deploy/prod/
          kubectl -n latere set image deployment/agon-web \
            agon-web=${{ needs.build.outputs.image }}
          kubectl -n latere rollout status deployment/agon-web --timeout=180s

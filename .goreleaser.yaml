version: 2

project_name: agon

before:
  hooks:
    - go mod tidy

builds:
  - id: agon
    main: ./cmd/agon
    binary: agon
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "agon_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE*
      - README.md

checksum:
  name_template: "checksums.txt"

# Categorize commit messages by Go-style prefix into release-note groups.
changelog:
  use: git
  sort: asc
  groups:
    - title: "CLI & orchestration"
      regexp: '^(cli|round|summary|agon)(\([^)]+\))?:'
      order: 0
    - title: "State & persistence"
      regexp: '^(state|ledger|input)(\([^)]+\))?:'
      order: 1
    - title: "Critic protocol"
      regexp: '^critic(\([^)]+\))?:'
      order: 2
    - title: "Subprocess drivers"
      regexp: '^agent(\([^)]+\))?:'
      order: 3
    - title: "Spec / documentation"
      regexp: '^(spec|docs)(\([^)]+\))?:'
      order: 4
    - title: "Tests, scripts & build"
      regexp: '^(scripts|e2e|ci|test|build)(\([^)]+\))?:'
      order: 5
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^Merge"
      - "^merge"
      - "^chore:"

release:
  draft: false
  prerelease: auto
  github:
    owner: latere-ai
    name: agon
  header: |
    # agon {{.Tag}}

    Adversarial review for Claude Code coding sessions.

    Changes below are grouped by area, derived from the commit log
    between {{.PreviousTag}} and {{.Tag}}.

  footer: |
    ## Install

    ```sh
    OS=$(uname -s | tr '[:upper:]' '[:lower:]')
    ARCH=$(uname -m); [[ "$ARCH" == "x86_64" ]] && ARCH=amd64
    curl -L "https://github.com/latere-ai/agon/releases/download/{{.Tag}}/agon_{{.Version}}_${OS}_${ARCH}.tar.gz" | tar xz
    ```

    ## Verify

    ```sh
    agon --version
    agon --help
    ```

version: 2

project_name: debate

before:
  hooks:
    - go mod tidy

builds:
  - id: debate
    main: ./cmd/debate
    binary: debate
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "debate_{{.Version}}_{{.Os}}_{{.Arch}}"
    files:
      - LICENSE*
      - README.md
      - scripts/debate-stop-hook.sh

checksum:
  name_template: "checksums.txt"

release:
  draft: true
  github:
    owner: latere-ai
    name: debate
